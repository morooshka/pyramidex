# Single source of truth for Root node initialisation.
# pyramidex init reads this file and writes all values to the graph.
# Any change to these values must ship as a versioned migration in migrations/.

root:
  version: 1

  schema: |
    (:Root {version, schema, catalog, instructions})
      -[:HAS_DOMAIN]───► (:Domain {name, description})
      -[:HAS_RULE]─────► (:Rule {name, text})                      -[:IN_DOMAIN]──► (:Domain)
      -[:HAS_SKILL]────► (:Skill {name, description, prompt})      -[:IN_DOMAIN]──► (:Domain)
      -[:HAS_MEMORY]───► (:Memory {name, body, why, how_to_apply}) -[:IN_DOMAIN]──► (:Domain)
      -[:HAS_WORKFLOW]─► (:Workflow {name, description, config})    -[:IN_DOMAIN]──► (:Domain)
                           -[:HAS_TRIGGER]──► (:Trigger {idx, text})
                           -[:HAS_STEP]─────► (:Step {idx, text, notes})

  catalog: |
    MATCH (r:Root)-[:HAS_DOMAIN]->(d:Domain)
    OPTIONAL MATCH (r)-[:HAS_RULE]->(rule)-[:IN_DOMAIN]->(d)
    OPTIONAL MATCH (r)-[:HAS_SKILL]->(skill)-[:IN_DOMAIN]->(d)
    OPTIONAL MATCH (r)-[:HAS_MEMORY]->(mem)-[:IN_DOMAIN]->(d)
    OPTIONAL MATCH (r)-[:HAS_WORKFLOW]->(wf)-[:IN_DOMAIN]->(d)
    RETURN d.name                       AS domain,
           d.description                AS description,
           collect(DISTINCT rule.name)  AS rules,
           collect(DISTINCT skill.name) AS skills,
           collect(DISTINCT mem.name)   AS memories,
           collect(DISTINCT wf.name)    AS workflows

  instructions: |
    Session bootstrap — execute once immediately after reading this node, before responding to anything:
      Run the query in `catalog`. Retain the result for the entire session. Never re-run it.
      Use `schema` as the authoritative reference for all graph queries — node labels, properties, and relationship types.

    Before every task:
      1. Infer the relevant domain by matching the task against domain descriptions in the cached catalog.
      2. If data for that domain is already present in this session — proceed immediately, no graph queries.
      3. If not yet loaded — fetch all data for that domain, mark it as loaded, then proceed.

# Type domains created by pyramidex init on every fresh install.
# Contextual domains (code, shell, deploy, etc.) come from pyramidex migrate.
domains:
  - name: rules
    description: "All behavioral rules — load when the user asks to list or review rules"
  - name: skills
    description: "All skills — load when the user asks to list available skills or slash commands"
  - name: memories
    description: "All retained memories — load when the user asks to review or manage memories"
  - name: workflows
    description: "All workflows — load when the user asks to follow a process or list available procedures"
